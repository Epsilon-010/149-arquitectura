<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://149arquitectura.mx/" />

    <!-- Theme + SEO basics -->
    <meta name="theme-color" content="#F8F7F2" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="149 Arquitectura" />
    <meta
      name="description"
      content="149 Arquitectura — estudio de arquitectura contemporánea en Oaxaca. Diseño arquitectónico, remodelación, mobiliario y supervisión de obra para proyectos residenciales, corporativos e interiorismo."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_MX" />
    <meta property="og:site_name" content="149 Arquitectura" />
    <meta property="og:url" content="https://149arquitectura.mx/" />
    <meta property="og:title" content="149 Arquitectura — Estudio en Oaxaca" />
    <meta
      property="og:description"
      content="Estudio de arquitectura contemporánea en Oaxaca. Cada proyecto comienza con la pregunta de cómo debe sentirse el lugar."
    />
    <meta property="og:image" content="https://res.cloudinary.com/dsiuwnc0c/image/upload/f_auto,q_auto,w_1200,h_630,c_fill,g_auto/v1777585820/9_bqiurv.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Casa contemporánea diseñada por 149 Arquitectura" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="149 Arquitectura" />
    <meta
      name="twitter:description"
      content="Estudio de arquitectura contemporánea en Oaxaca."
    />
    <meta name="twitter:image" content="https://res.cloudinary.com/dsiuwnc0c/image/upload/f_auto,q_auto,w_1200,h_630,c_fill,g_auto/v1777585820/9_bqiurv.png" />

    <!-- Resource hints. Cloudinary serves all hero photographs; opening
         the TLS connection early lets the LCP image start downloading
         the moment the HTML lands. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Caviar Dreams (display + body) — local. Preload only the two
         variants that show above the fold (Regular + Italic) to keep
         the LCP fast; Bold + BoldItalic load on demand via @font-face. -->
    <link rel="preload" href="/fonts/CaviarDreams.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/CaviarDreams_Italic.ttf" as="font" type="font/ttf" crossorigin />

    <!-- JetBrains Mono — only used for project numbers and tabular data -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Preload the LCP image (first hero photograph) with the same
         Cloudinary URL Hero.tsx requests, so the preload hits the
         cache the moment the React component mounts. URL must match
         exactly — any difference defeats the preload. No `crossorigin`
         attribute because the <img> in Hero.tsx is rendered without
         `crossOrigin`, and the preload's credentials mode must match
         the actual request or the browser refetches the resource. -->
    <link rel="preload" as="image" href="https://res.cloudinary.com/dsiuwnc0c/image/upload/f_auto,q_auto,w_1920,c_limit/v1777585820/9_bqiurv.png" fetchpriority="high" />

    <title>149 Arquitectura — Estudio de Arquitectura Contemporánea en Oaxaca</title>

    <!-- Schema.org structured data — LocalBusiness for rich results
         (Google Business, Maps, Knowledge panel). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "149 Arquitectura",
        "description": "Estudio de arquitectura contemporánea en Oaxaca de Juárez",
        "url": "https://149arquitectura.mx/",
        "image": "https://res.cloudinary.com/dsiuwnc0c/image/upload/f_auto,q_auto,w_1200,h_630,c_fill,g_auto/v1777585820/9_bqiurv.png",
        "telephone": "+5219513505166",
        "priceRange": "$$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Niños Héroes 635-B, Ex-Marquezado",
          "addressLocality": "Oaxaca de Juárez",
          "addressRegion": "Oaxaca",
          "postalCode": "68034",
          "addressCountry": "MX"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 17.0732,
          "longitude": -96.7266
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "10:00",
            "closes": "17:00"
          }
        ],
        "sameAs": [
          "https://instagram.com/149arquitectura"
        ],
        "areaServed": {
          "@type": "Place",
          "name": "México"
        },
        "knowsAbout": [
          "Arquitectura contemporánea",
          "Diseño arquitectónico",
          "Interiorismo",
          "Remodelación",
          "Diseño de mobiliario",
          "Supervisión de obra"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
